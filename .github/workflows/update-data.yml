name: Update İSPARK Data

on:
  schedule:
    # Her saat başı çalışır (UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update parking data
        run: python3 scripts/update_parking_week.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/parking_week.json public/data/park_locations.json
          
          # Sadece değişiklik varsa commit at
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update İSPARK data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
